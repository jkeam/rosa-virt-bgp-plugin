---
# BGP-VM Controller Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bgp-vm-controller
  namespace: rosa-virt-bgp-system
  labels:
    app: bgp-vm-controller
    app.kubernetes.io/name: bgp-vm-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bgp-vm-controller
  template:
    metadata:
      labels:
        app: bgp-vm-controller
    spec:
      serviceAccountName: bgp-vm-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
      - name: controller
        image: quay.io/andy_krohg/rosa-virt-bgp-controller:v0.1.0
        imagePullPolicy: IfNotPresent
        args:
        - --config=/etc/controller/config.yaml
        - --enable-leader-election
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        - --zap-log-level=info
        env:
        - name: WATCH_NAMESPACE
          value: ""
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: config
          mountPath: /etc/controller
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: bgp-vm-controller-config
---
# Service for metrics
apiVersion: v1
kind: Service
metadata:
  name: bgp-vm-controller-metrics
  namespace: rosa-virt-bgp-system
  labels:
    app: bgp-vm-controller
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8080
    targetPort: metrics
  selector:
    app: bgp-vm-controller
