---
# ClusterUserDefinedNetwork - creates an isolated L2 network for VMs
# This uses localnet topology for direct connectivity to the physical VLAN
apiVersion: k8s.ovn.org/v1
kind: ClusterUserDefinedNetwork
metadata:
  name: vm-bgp-network
spec:
  namespaceSelector:
    matchLabels:
      bgp-enabled: "true"
  network:
    topology: Localnet
    localnet:
      role: Secondary
      subnets:
      - "192.168.100.0/24"
      excludeSubnets:
      - "192.168.100.1/32"      # Reserve for VLAN gateway
      - "192.168.100.254/32"    # Reserve for broadcast
      physicalNetworkName: vlan100
      ipam:
        lifecycle: Persistent
        mode: Enabled
