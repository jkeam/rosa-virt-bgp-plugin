---
# FRR-K8s DaemonSet - BGP speaker running on each node
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: frr-k8s
  namespace: frr-k8s-system
  labels:
    app: frr-k8s
    component: bgp-speaker
spec:
  selector:
    matchLabels:
      app: frr-k8s
  template:
    metadata:
      labels:
        app: frr-k8s
    spec:
      hostNetwork: true
      serviceAccountName: frr-k8s
      tolerations:
      - key: node-role.kubernetes.io/master
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
      containers:
      - name: frr-k8s
        image: quay.io/metallb/frr-k8s:v0.0.14
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
          privileged: true
        env:
        - name: FRR_CONFIG_FILE
          value: /etc/frr_reloader/frr.conf
        - name: FRR_RELOADER_PID_FILE
          value: /etc/frr_reloader/reloader.pid
        - name: METRICS_BIND_ADDRESS
          value: :7473
        volumeMounts:
        - name: frr-sockets
          mountPath: /var/run/frr
        - name: frr-conf
          mountPath: /etc/frr_reloader
        ports:
        - containerPort: 7473
          name: monitoring
        livenessProbe:
          httpGet:
            path: /healthz
            port: 7473
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 7473
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: frr-sockets
        emptyDir: {}
      - name: frr-conf
        emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frr-k8s
  namespace: frr-k8s-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: frr-k8s
rules:
- apiGroups: ["frrk8s.metallb.io"]
  resources: ["frrconfigurations", "frrconfigurations/status"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["frrk8s.metallb.io"]
  resources: ["frrnodestates", "frrnodestates/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: frr-k8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: frr-k8s
subjects:
- kind: ServiceAccount
  name: frr-k8s
  namespace: frr-k8s-system
