---
# BGP neighbor configuration - peers with laptop router
apiVersion: frrk8s.metallb.io/v1beta1
kind: FRRConfiguration
metadata:
  name: bgp-peers
  namespace: frr-k8s-system
spec:
  bgp:
    routers:
    - asn: 65100
      neighbors:
      - asn: 65000
        address: 192.168.100.1
        port: 179
        ebgpMultiHop: true
        passwordSecret:
          name: bgp-peer-secret
          namespace: frr-k8s-system
        bfdProfile: default
        toAdvertise:
          allowed:
            mode: filtered
        toReceive:
          allowed:
            mode: all
