---
# Base FRR configuration for demo
apiVersion: frrk8s.metallb.io/v1beta1
kind: FRRConfiguration
metadata:
  name: base-config
  namespace: frr-k8s-system
spec:
  bgp:
    bfdProfiles:
    - name: default
      receiveInterval: 300
      transmitInterval: 300
      detectMultiplier: 3
      echoMode: false
      minimumTtl: 254
    routers:
    - asn: 65100
      # TODO: Set router ID to your cluster node IP
      # Find with: oc get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}'
      id: 10.0.0.1
